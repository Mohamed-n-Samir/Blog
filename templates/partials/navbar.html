<header
    class="sticky top-0 z-50 border-b border-border/60 bg-background/70 backdrop-blur-xl"
>
    <div
        class="mx-auto grid max-w-7xl grid-cols-2 min-[875px]:grid-cols-[1fr_auto_1fr] items-center px-6 py-4"
    >
        <!-- Left -->
        <div class="justify-self-start">
            <a
                href="{{ url_for('blog') }}"
                class="flex shrink-0 items-center gap-2 font-display text-sm whitespace-nowrap"
            >
                <span
                    class="grid h-7 w-7 place-items-center rounded-md bg-accent/15 text-accent"
                >
                    <i data-lucide="terminal" class="h-4 w-4"></i>
                </span>
                <span class="font-semibold">Blog</span>
            </a>
        </div>

        <!-- Center -->
        <nav class="hidden min-[875px]:flex items-center gap-1 justify-self-center">
            <a
                href="{{ url_for('blog') }}"
                data-routes="/,/blog"
                class="nav-link rounded-md px-3 py-1.5 text-xs text-muted-foreground transition-colors hover:bg-panel hover:text-foreground"
            >
                <span class="text-accent">&gt;</span> Blog
            </a>

            <a
                href="{{ url_for('categories') }}"
                data-routes="/categories"
                class="nav-link rounded-md px-3 py-1.5 text-xs text-muted-foreground transition-colors hover:bg-panel hover:text-foreground"
            >
                <span class="text-accent">&gt;</span> Categories
            </a>

            <a
                href="{{ url_for('search_users') }}"
                data-routes="/users/search"
                class="nav-link rounded-md px-3 py-1.5 text-xs text-muted-foreground transition-colors hover:bg-panel hover:text-foreground"
            >
                <span class="text-accent">&gt;</span> Developers
            </a>
        </nav>

        <!-- Right -->
        <div class="justify-self-end flex items-center gap-4">
            {% if current_user %}
            <!-- User Dropdown Menu -->
            <div class="relative inline-block text-left" id="user-menu-container">
                <button
                    id="user-menu-button"
                    type="button"
                    class="flex items-center gap-2 rounded-md hover:bg-panel p-1.5 transition duration-300 cursor-pointer"
                    aria-expanded="false"
                    aria-haspopup="true"
                >
                    <img
                        class="h-6 w-6 rounded-full object-cover border border-border"
                        src="{{ current_user.image_path }}"
                        alt="{{ current_user.username }}"
                    >
                    <span class="text-xs font-semibold text-foreground font-mono">@{{ current_user.username }}</span>
                    <i data-lucide="chevron-down" class="h-3 w-3 text-muted-foreground"></i>
                </button>

                <!-- Dropdown panel, show/hide based on dropdown state. -->
                <div
                    id="user-menu-dropdown"
                    class="absolute right-0 z-50 mt-2 w-48 origin-top-right rounded-xl border border-border bg-panel p-2 shadow-2xl transition-all duration-200 opacity-0 scale-95 pointer-events-none"
                    role="menu"
                    aria-orientation="vertical"
                    aria-labelledby="user-menu-button"
                    tabindex="-1"
                >
                    <a
                        href="{{ url_for('user_profile') }}"
                        class="flex items-center gap-2 rounded-lg px-3 py-2 text-xs text-muted-foreground hover:bg-panel-2 hover:text-foreground transition duration-200"
                        role="menuitem"
                        tabindex="-1"
                    >
                        <i data-lucide="user" class="h-3.5 w-3.5"></i>
                        <span>profile_settings()</span>
                    </a>
                    
                    <a
                        href="{{ url_for('new_post') }}"
                        class="flex items-center gap-2 rounded-lg px-3 py-2 text-xs text-muted-foreground hover:bg-panel-2 hover:text-foreground transition duration-200"
                        role="menuitem"
                        tabindex="-1"
                    >
                        <i data-lucide="plus-circle" class="h-3.5 w-3.5"></i>
                        <span>create_post()</span>
                    </a>
                    
                    <hr class="border-border/60 my-1">
                    
                    <a
                        href="/logout"
                        class="flex items-center gap-2 rounded-lg px-3 py-2 text-xs text-rose-400 hover:bg-rose-500/10 hover:text-rose-300 transition duration-200"
                        role="menuitem"
                        tabindex="-1"
                    >
                        <i data-lucide="log-out" class="h-3.5 w-3.5"></i>
                        <span>logout()</span>
                    </a>
                </div>
            </div>
            {% else %}
            <button
                id="nav-register-btn"
                class="rounded-md border border-accent/40 px-3 py-1.5 text-xs text-accent transition-colors hover:bg-accent/20 cursor-pointer"
            >
                register()
            </button>

            <button
                id="nav-login-btn"
                class="rounded-md border border-accent/40 bg-accent/10 px-3 py-1.5 text-xs text-accent transition-colors hover:bg-accent/20 cursor-pointer"
            >
                login()
            </button>
            {% endif %}

            <!-- Mobile Menu Toggle Button -->
            <button
                id="mobile-menu-toggle"
                class="flex min-[875px]:hidden items-center justify-center p-2 rounded-md hover:bg-panel text-muted-foreground hover:text-foreground transition cursor-pointer"
            >
                <span id="menu-icon-open" class="block"><i data-lucide="menu" class="h-5 w-5"></i></span>
                <span id="menu-icon-close" class="hidden"><i data-lucide="x" class="h-5 w-5"></i></span>
            </button>
        </div>
    </div>

    <!-- Mobile Navigation Menu -->
    <div id="mobile-menu" class="min-[875px]:hidden border-t border-border/40 bg-background/95 backdrop-blur-xl transition-all duration-300 ease-in-out overflow-hidden flex flex-col gap-2 px-6 py-0 max-h-0 opacity-0 pointer-events-none">
        <a
            href="{{ url_for('blog') }}"
            data-routes="/,/blog"
            class="nav-link rounded-lg px-4 py-2 text-sm text-muted-foreground hover:bg-panel hover:text-foreground transition-colors flex items-center gap-2"
        >
            <span class="text-accent">&gt;</span> Blog
        </a>

        <a
            href="{{ url_for('categories') }}"
            data-routes="/categories"
            class="nav-link rounded-lg px-4 py-2 text-sm text-muted-foreground hover:bg-panel hover:text-foreground transition-colors flex items-center gap-2"
        >
            <span class="text-accent">&gt;</span> Categories
        </a>

        <a
            href="{{ url_for('search_users') }}"
            data-routes="/users/search"
            class="nav-link rounded-lg px-4 py-2 text-sm text-muted-foreground hover:bg-panel hover:text-foreground transition-colors flex items-center gap-2"
        >
            <span class="text-accent">&gt;</span> Developers
        </a>
    </div>
</header>
