<header
    class="sticky top-0 z-50 border-b border-border/60 bg-background/70 backdrop-blur-xl"
>
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
        <a
            href="#"
            class="flex shrink-0 items-center gap-2 font-display text-sm whitespace-nowrap"
            ><span
                class="grid h-7 w-7 place-items-center rounded-md bg-accent/15 text-accent"
                ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-terminal h-4 w-4"
                    aria-hidden="true"
                >
                    <path d="M12 19h8"></path>
                    <path d="m4 17 6-6-6-6"></path></svg></span
            ><span class="font-semibold">Blog</span></a
        >
        <nav class="hidden items-center gap-1 min-[875px]:flex">
            <a
                href="{{ url_for('blogs')}}"
                data-routes="/,/blogs"
                class="nav-link rounded-md px-3 py-1.5 text-xs text-muted-foreground transition-colors hover:bg-panel hover:text-foreground"
                ><span class="text-accent">&gt;</span> Blogs</a
            >
            <a
                href="{{ url_for('categories')}}"
                data-routes="/categories"
                class="nav-link rounded-md px-3 py-1.5 text-xs text-muted-foreground transition-colors hover:bg-panel hover:text-foreground"
                ><span class="text-accent">&gt;</span> Categories</a
            >
        </nav>
        <div>
            <button
                class="rounded-md border border-accent/40 px-3 py-1.5 text-xs text-accent transition-colors hover:bg-accent/20"
            >
                register()
            </button>
            <button
                class="rounded-md border border-accent/40 bg-accent/10 px-3 py-1.5 text-xs text-accent transition-colors hover:bg-accent/20"
            >
                login()
            </button>
        </div>
    </div>
</header>
