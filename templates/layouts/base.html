<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme inline {
                --color-background: var(--background);
                --color-foreground: var(--foreground);
                --color-panel: var(--panel);
                --color-panel-2: var(--panel-2);
                --color-border: var(--border);
                --color-muted: var(--muted);
                --color-muted-foreground: var(--muted-foreground);
                --color-accent: var(--accent);
                --color-accent-2: var(--accent-2);
                --color-accent-3: var(--accent-3);
                --color-success: var(--success);
                --color-warning: var(--warning);
                --font-mono:
                    "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo,
                    monospace;
                --font-display:
                    "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
                --color-sidebar-ring: var(--sidebar-ring);
                --color-sidebar-border: var(--sidebar-border);
                --color-sidebar-accent-foreground: var(
                    --sidebar-accent-foreground
                );
                --color-sidebar-accent: var(--sidebar-accent);
                --color-sidebar-primary-foreground: var(
                    --sidebar-primary-foreground
                );
                --color-sidebar-primary: var(--sidebar-primary);
                --color-sidebar-foreground: var(--sidebar-foreground);
                --color-sidebar: var(--sidebar);
            }
            @layer base {
                * {
                    border-color: var(--color-border);
                }
                html,
                body {
                    background: var(--color-background);
                    color: var(--color-foreground);
                }
                body {
                    font-family: var(--font-mono);
                    background-image:
                        linear-gradient(
                            to right,
                            oklch(0.22 0.014 250 / 0.5) 1px,
                            transparent 1px
                        ),
                        linear-gradient(
                            to bottom,
                            oklch(0.22 0.014 250 / 0.5) 1px,
                            transparent 1px
                        );
                    background-size: 48px 48px;
                }
                ::selection {
                    background: oklch(0.72 0.18 45 / 0.35);
                }
            }
            @utility panel {
                background: var(--color-panel);
                border: 1px solid var(--color-border);
                border-radius: 12px;
                transition:
                    border-color 300ms ease,
                    box-shadow 300ms ease,
                    transform 300ms ease;
            }

            @utility lift {
                transition:
                    transform 350ms cubic-bezier(0.22, 1, 0.36, 1),
                    border-color 350ms ease,
                    box-shadow 350ms ease;
            }

            @utility lift-hover {
                &:hover {
                    transform: translateY(-4px);
                    box-shadow: 0 12px 40px -12px oklch(0.72 0.18 45 / 0.25);
                }
            }
        </style>
    <link rel="stylesheet" href="{{ url_for("static", path='css/index.css')}}" />
</head>

<body>
    {% include 'partials/navbar.html' %}
    {% block content %} {% endblock content %}

    <script type="module" src="{{ url_for('static', path='js/navbar.js')}}"></script>
</body>

</html>
